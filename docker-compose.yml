services:
  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-ghcr.io/josephcy95/cli-proxy-api:latest}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli-proxy-api
    environment:
      DEPLOY: ${DEPLOY:-}
      # Optional override; image default is /data
      # CLIPROXY_DATA_DIR: /data
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      # Single persistent volume: config.yaml, auths/, logs/, plugins/, usage.db
      - ${CLI_PROXY_DATA_PATH:-./data}:/data
    restart: unless-stopped

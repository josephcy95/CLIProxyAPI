services:
  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-ghcr.io/josephcy95/cli-proxy-api:latest}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli-proxy-api
    environment:
      DEPLOY: ${DEPLOY:-}
      # Optional; image default is already /data
      CLIPROXY_DATA_DIR: ${CLIPROXY_DATA_DIR:-/data}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      # Single mount (unlike upstream multi-volume config/auths/logs).
      # Host layout under CLI_PROXY_DATA_PATH:
      #   config.yaml  auths/  logs/  plugins/  usage.db
      - ${CLI_PROXY_DATA_PATH:-./data}:/data
    restart: unless-stopped

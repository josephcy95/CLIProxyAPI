name: docker-image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Docker image tag to publish
        required: false
        default: latest
      platforms:
        description: Target platforms. Use linux/amd64 for the fastest build.
        required: false
        default: linux/amd64
  push:
    tags:
      - v*

permissions:
  contents: read
  packages: write

env:
  APP_NAME: CLIProxyAPI
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cli-proxy-api

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Refresh models catalog
        run: bash .github/scripts/refresh-model-catalogs.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build metadata
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          platforms="${{ inputs.platforms }}"
          if [ -z "${tag}" ]; then
            tag="${GITHUB_REF_NAME}"
          fi
          if [ -z "${platforms}" ]; then
            platforms="linux/amd64"
          fi
          image_name="$(printf '%s' "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          commit="$(git rev-parse --short HEAD)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          version="${tag}"
          if [ "${tag}" = "latest" ]; then
            version="$(git describe --tags --abbrev=0)"
          fi

          # One build, multiple tags: primary tag + commit short SHA.
          # Version tags (v*) also move :latest so release + latest share one digest.
          tags="${image_name}:${tag}"$'\n'"${image_name}:${commit}"
          if [[ "${tag}" == v* ]]; then
            tags+=$'\n'"${image_name}:latest"
          fi

          {
            echo "IMAGE_NAME=${image_name}"
            echo "IMAGE_TAG=${tag}"
            echo "PLATFORMS=${platforms}"
            echo "VERSION=${version}"
            echo "COMMIT=${commit}"
            echo "BUILD_DATE=${build_date}"
            echo "IMAGE_TAGS<<EOF"
            printf '%s\n' "${tags}"
            echo "EOF"
          } >> "${GITHUB_ENV}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: ${{ env.IMAGE_TAGS }}

      - name: Print image
        run: |
          echo "Published tags:"
          printf '%s\n' "${IMAGE_TAGS}"
